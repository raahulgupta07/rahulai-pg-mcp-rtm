<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#FAF9F5" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <title>RTM Agent</title>
  <script>
    // Apply appearance before paint to avoid flash.
    // Palette values mirror PALETTES in src/lib/theme.ts — keep in sync.
    try {
      var a = JSON.parse(localStorage.getItem('rtm-appearance') || '{}');
      var r = document.documentElement;
      var mode = a.mode || 'auto';
      var dark = mode === 'auto'
        ? window.matchMedia('(prefers-color-scheme: dark)').matches
        : mode === 'dark';
      r.setAttribute('data-theme', dark ? 'dark' : 'light');
      r.setAttribute('data-density', a.density || 'comfortable');

      var P = {
        terracotta: [['#C96442','#B5573A','#F4E4DA','#5A2B1C'],['#E89070','#F0A487','#3A2823','#F4E4DA']],
        ocean:      [['#3B7EA1','#336E8D','#DEEAF0','#1B3A49'],['#6FAAC8','#84B9D4','#1E2E38','#DEEAF0']],
        forest:     [['#4F7A4A','#446B40','#E2EDDF','#243A22'],['#7FB078','#93BE8C','#233022','#E2EDDF']],
        violet:     [['#7A5CA8','#6B5096','#EAE3F2','#382A4D'],['#A98FD0','#B9A2DA','#2B2438','#EAE3F2']],
        rose:       [['#B5567D','#A14C6F','#F4E1E8','#4F2536'],['#D98AAA','#E29BB7','#36242C','#F4E1E8']],
        slate:      [['#5F5D54','#51504A','#E8E6DD','#2C2B26'],['#A8A39A','#B8B3AA','#33322D','#EDEAE0']]
      };
      var sk = a.skin || 'terracotta';
      if (P[sk]) {
        var q = P[sk][dark ? 1 : 0];
        r.style.setProperty('--accent', q[0]); r.style.setProperty('--accent-hover', q[1]);
        r.style.setProperty('--accent-soft', q[2]); r.style.setProperty('--accent-ink', q[3]);
        r.style.setProperty('--color-primary', q[0]);
      }
    } catch (e) {}
  </script>
  %sveltekit.head%
</head>
<body data-sveltekit-prerender="true">
  <div style="display: contents">%sveltekit.body%</div>
</body>
</html>
